<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта детства</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://api-maps.yandex.ru/2.1/?apikey=d9c12e56-77be-4918-ba45-c1d93100f941&lang=ru_RU"
        type="text/javascript">
        </script>
</head>

<body>
    <div class="container">
        <a href="login.html">Вход для администратора</a>
        <h1>Найдите кружок для ребенка</h1>
        <div class="form-group">
            <label>Город:</label>
            <select id="city-select"></select>
        </div>
        <div class="form-group">
            <label>Дата рождения ребенка:</label>
            <input type="date" id="birth-date" />
            <button onclick="calculateAgeGroup()">Определить возраст</button>
            <p>Возрастная группа: <span id="age-group-result"></span></p>
        </div>
        <div class="form-group">
            <label>Цена (руб):</label>
            <input type="number" id="price-min" placeholder="Минимум">
            <input type="number" id="price-max" placeholder="Максимум">
        </div>
        <div class="form-group">
            <label>Район:</label>
            <select id="district-select"></select>
        </div>
        <div class="form-group">
            <label>Вид активности:</label>
            <select id="activity-select">
                <option value="">Любая</option>
                <option value="Спорт">Спорт</option>
                <option value="Творчество">Творчество</option>
                <option value="IT">IT</option>
                <option value="Музыка">Музыка</option>
                <option value="Языки">Языки</option>
            </select>
        </div>
        <button onclick="applyFilters()">Применить фильтры</button>
        <div id="map"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
