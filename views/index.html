<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта детства</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0066cc">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="/css/style.css" />
    <script src="https://api-maps.yandex.ru/2.1/?apikey=d9c12e56-77be-4918-ba45-c1d93100f941&lang=ru_RU"
        type="text/javascript">
        </script>
</head>

<body>
    <div class="container">
        <h1>Найдите кружок для ребенка</h1>
        <div class="grid">
            <div>
                <label>Город:</label>
                <select id="city" tabindex="1"></select>
                <label>Дата рождения ребенка:</label>
                <input type="date" id="birth-date" tabindex="2" />
                <button id="calculator" tabindex="3">Определить возраст</button>
                <p>Возрастная группа: <span id="age-group-result"></span></p>
            </div>
            <div>
                <label>Цена (руб):</label>
                <input type="number" id="price-min" min="0" placeholder="Минимум" tabindex="4">
                <input type="number" id="price-max" min="0" placeholder="Максимум" tabindex="5">
                <label>Район:</label>
                <select id="district" tabindex="6"></select>
                <label>Вид активности:</label>
                <select id="activity" tabindex="7">
                    <option value="">Любая</option>
                    <option value="Спорт">Спорт</option>
                    <option value="Творчество">Творчество</option>
                    <option value="IT">IT</option>
                    <option value="Музыка">Музыка</option>
                    <option value="Языки">Языки</option>
                </select>
            </div>
        </div>
        <button id="filter" tabindex="8">Применить фильтры</button>
        <p id="search-result"></p>
        <ul id="clubs-list"></ul>
        <div id="map"></div>
        <button id="install-btn" hidden>Установить приложение</button>
    </div>
    <script type="module" src="/js/script.js"></script>
</body>

</html>
