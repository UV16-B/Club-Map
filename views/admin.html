<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://api-maps.yandex.ru/2.1/?apikey=d9c12e56-77be-4918-ba45-c1d93100f941&lang=ru_RU"
        type="text/javascript">
        </script>
</head>

<body>
    <div class="container">
        <h2>Добавить кружок</h2>
        <form id="addClubForm">
            <input id="name" placeholder="Название">
            <label>Город:</label>
            <select id="city" name="city"></select>
            <input id="district" placeholder="Район">
            <input id="activity" placeholder="Активность">
            <input id="ageGroup" placeholder="Возрастная группа">
            <input id="price" type="number" placeholder="Цена">
            <input id="address" placeholder="Адрес">
            <input id="lat" placeholder="Широта">
            <input id="lon" placeholder="Долгота">
            <input id="contact" placeholder="Телефон">
            <button type="submit">Добавить</button>
        </form>
        <p id="message"></p>
        <div id="map"></div>
    </div>
    <script src="/js/admin.js"></script>
</body>

</html>
